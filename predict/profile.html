<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>내 정보 | 라라댄스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-wrap { max-width: 520px; margin: 0 auto; padding: 32px; }
    .profile-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #fdf8ec, #f5e8c8);
      border: 2px solid var(--gold-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    .profile-name { text-align:center; font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; color:var(--text-dark); margin-bottom:4px; }
    .profile-role-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      margin: 0 auto 20px;
    }
    .role-admin    { background:#e8d5f0; color:#6a2d8f; }
    .role-teacher  { background:#d5e8f0; color:#1a6080; }
    .role-student  { background:#e8f0d5; color:#3a6020; }
    .profile-info-list { border-top: 1px solid var(--border-light); padding-top: 16px; }
    .profile-info-row { display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid var(--border-light); font-size:.9rem; }
    .profile-info-row:last-child { border-bottom: none; }
    .profile-info-label { color: var(--text-light); font-size:.8rem; }
    .profile-info-value { color: var(--text-dark); font-weight: 500; }

    .section-title-sm { font-size:.78rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-dark); margin-bottom:16px; }
    .btn-save-profile { width:100%; padding:12px; background:var(--text-dark); color:#fff; border:none; border-radius:50px; font-family:'Noto Sans KR',sans-serif; font-size:.9rem; font-weight:500; cursor:pointer; transition:all .25s; margin-top:8px; }
    .btn-save-profile:hover { background:#1a1210; }
    @media(max-width:600px) { .profile-wrap{padding:20px 16px} .profile-card{padding:24px 20px} }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#b89c6b" stroke-width="4"/>
          <g fill="#825b3a" stroke="#825b3a" stroke-linecap="round">
            <path d="M 45 65 L 140 120" stroke-width="6"/><path d="M 120 108 L 165 135" stroke-width="3"/>
            <path d="M 95 95 C 105 110 120 115 125 105 C 115 100 105 92 95 95 Z" stroke="none"/>
            <path d="M 103 98 C 110 80 120 65 116 55 C 112 60 102 75 95 92 Z" stroke="none"/>
            <path d="M 116 55 Q 95 45 78 40" stroke-width="2.5" fill="none"/>
            <path d="M 115 55 Q 105 40 100 22" stroke-width="2" fill="none"/>
            <ellipse cx="122" cy="48" rx="7" ry="5.5" transform="rotate(-30 122 48)" stroke="none"/>
          </g>
          <text x="100" y="148" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="600" fill="#825b3a" text-anchor="middle" letter-spacing="0.1em">L A L A</text>
          <text x="100" y="165" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#825b3a" text-anchor="middle" letter-spacing="0.05em">DANCE STUDIO</text>
        </svg>
        <div class="logo-texts">
          <span class="logo-main">라라댄스무용학원</span>
          <span class="logo-badge">출석 관리 시스템</span>
        </div>
      </a>
      <nav class="nav-links">
        <span class="nav-user"><span class="nav-user-dot"></span><span id="navUserName"></span></span>
        <a href="dashboard.html">← 대시보드</a>
        <a href="#" class="nav-logout" id="logoutBtn">로그아웃</a>
      </nav>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <div class="page-eyebrow">MY PROFILE</div>
      <h1 class="page-title">내 정보</h1>
      <p class="page-date">계정 정보 및 비밀번호 변경</p>
    </div>
  </div>

  <main>
    <div class="profile-wrap">
      <!-- 기본 정보 -->
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-name" id="profileName"></div>
        <div style="text-align:center;margin-bottom:16px">
          <span class="profile-role-badge" id="profileRoleBadge"></span>
        </div>
        <div class="profile-info-list">
          <div class="profile-info-row">
            <span class="profile-info-label">아이디</span>
            <span class="profile-info-value" id="profileEmail"></span>
          </div>
          <div class="profile-info-row">
            <span class="profile-info-label">구분</span>
            <span class="profile-info-value" id="profileRoleText"></span>
          </div>
        </div>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="profile-card">
        <div class="section-title-sm">비밀번호 변경</div>
        <div class="form-group">
          <label class="form-label">현재 비밀번호</label>
          <input type="password" id="currentPw" class="form-input" placeholder="현재 비밀번호 입력" />
        </div>
        <div class="form-group">
          <label class="form-label">새 비밀번호</label>
          <input type="password" id="newPw" class="form-input" placeholder="새 비밀번호 입력" />
        </div>
        <div class="form-group">
          <label class="form-label">새 비밀번호 확인</label>
          <input type="password" id="confirmPw" class="form-input" placeholder="새 비밀번호 재입력" />
        </div>
        <p class="form-error" id="pwError"></p>
        <button class="btn-save-profile" id="savePwBtn">비밀번호 변경</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    const session = requireAuth();
    if (!session) throw new Error('not authenticated');

    document.getElementById('navUserName').textContent = session.name;
    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault(); clearSession(); window.location.href = 'login.html';
    });

    const ROLE_LABELS = { admin:'관리자', teacher:'선생님', student:'원생' };
    const ROLE_CLASSES = { admin:'role-admin', teacher:'role-teacher', student:'role-student' };
    const ROLE_EMOJIS  = { admin:'👑', teacher:'🎓', student:'🩰' };

    document.getElementById('profileAvatar').textContent  = ROLE_EMOJIS[session.role] || '👤';
    document.getElementById('profileName').textContent    = session.name;
    document.getElementById('profileEmail').textContent   = session.email;
    document.getElementById('profileRoleText').textContent = ROLE_LABELS[session.role] || session.role;
    const badge = document.getElementById('profileRoleBadge');
    badge.textContent = ROLE_LABELS[session.role] || session.role;
    badge.className = 'profile-role-badge ' + (ROLE_CLASSES[session.role] || '');

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('savePwBtn').addEventListener('click', async () => {
      const errEl  = document.getElementById('pwError');
      const cur    = document.getElementById('currentPw').value;
      const nw     = document.getElementById('newPw').value;
      const conf   = document.getElementById('confirmPw').value;

      errEl.classList.remove('show');
      if (!cur)           { errEl.textContent = '현재 비밀번호를 입력해주세요.'; errEl.classList.add('show'); return; }
      if (!nw)            { errEl.textContent = '새 비밀번호를 입력해주세요.'; errEl.classList.add('show'); return; }
      if (nw.length < 4)  { errEl.textContent = '비밀번호는 4자 이상이어야 합니다.'; errEl.classList.add('show'); return; }
      if (nw !== conf)    { errEl.textContent = '새 비밀번호가 일치하지 않습니다.'; errEl.classList.add('show'); return; }

      const btn = document.getElementById('savePwBtn');
      btn.textContent = '변경 중...'; btn.disabled = true;
      try {
        const res = await changePassword(session.id, cur, nw);
        if (res.ok) {
          showToast('✅ 비밀번호가 변경되었습니다. 다시 로그인해주세요.');
          setTimeout(() => { clearSession(); window.location.href = 'login.html'; }, 1500);
        } else {
          errEl.textContent = res.msg; errEl.classList.add('show');
          btn.textContent = '비밀번호 변경'; btn.disabled = false;
        }
      } catch {
        errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.'; errEl.classList.add('show');
        btn.textContent = '비밀번호 변경'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
