<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>회원가입 | 라라댄스 출석 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#b89c6b" stroke-width="4"/>
          <g fill="#825b3a" stroke="#825b3a" stroke-linecap="round">
            <path d="M 45 65 L 140 120" stroke-width="6"/>
            <path d="M 120 108 L 165 135" stroke-width="3"/>
            <path d="M 95 95 C 105 110 120 115 125 105 C 115 100 105 92 95 95 Z" stroke="none"/>
            <path d="M 103 98 C 110 80 120 65 116 55 C 112 60 102 75 95 92 Z" stroke="none"/>
            <path d="M 116 55 Q 95 45 78 40" stroke-width="2.5" fill="none"/>
            <path d="M 115 55 Q 105 40 100 22" stroke-width="2" fill="none"/>
            <ellipse cx="122" cy="48" rx="7" ry="5.5" transform="rotate(-30 122 48)" stroke="none"/>
          </g>
          <text x="100" y="148" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="600" fill="#825b3a" text-anchor="middle" letter-spacing="0.1em">L A L A</text>
          <text x="100" y="165" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#825b3a" text-anchor="middle" letter-spacing="0.05em">DANCE STUDIO</text>
        </svg>
        <div class="logo-texts">
          <span class="logo-main">라라댄스무용학원</span>
          <span class="logo-badge">출석 관리 시스템</span>
        </div>
      </a>
      <nav class="nav-links"><a href="login.html">← 로그인으로</a></nav>
    </div>
  </header>

  <main class="auth-body">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">✨</span>
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-sub">학원 코드는 선생님께 문의하세요</p>
      </div>
      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">이름</label>
          <input type="text" id="name" class="form-input" placeholder="홍길동" autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">아이디</label>
          <input type="text" id="email" class="form-input" placeholder="사용할 아이디 입력 (공백 제외)" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="role">역할</label>
          <select id="role" class="form-input">
            <option value="student">원생</option>
            <option value="teacher">선생님</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="6자 이상" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
          <input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호 재입력" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="code">학원 코드</label>
          <input type="text" id="code" class="form-input" placeholder="선생님께 문의" autocomplete="off" />
          <p class="form-hint">* 학원 코드가 있어야 가입할 수 있습니다</p>
        </div>
        <p class="form-error" id="errorMsg"></p>
        <button type="submit" class="btn-primary" id="submitBtn">가입하기 →</button>
      </form>
      <div class="auth-footer">
        이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    if (getSession()) window.location.href = 'dashboard.html';

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl   = document.getElementById('errorMsg');
      const btn     = document.getElementById('submitBtn');
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const role    = document.getElementById('role').value;
      const password= document.getElementById('password').value;
      const confirm = document.getElementById('passwordConfirm').value;
      const code    = document.getElementById('code').value.trim();

      if (!name || !email || !password || !code) {
        errEl.textContent = '모든 항목을 입력해주세요.'; errEl.classList.add('show'); return;
      }
      if (/\s/.test(email)) {
        errEl.textContent = '아이디에 공백은 사용할 수 없습니다.'; errEl.classList.add('show'); return;
      }
      if (password.length < 6) {
        errEl.textContent = '비밀번호는 6자 이상이어야 합니다.'; errEl.classList.add('show'); return;
      }
      if (password !== confirm) {
        errEl.textContent = '비밀번호가 일치하지 않습니다.'; errEl.classList.add('show'); return;
      }

      btn.textContent = '처리 중...'; btn.disabled = true;
      try {
        const result = await signup(name, email, password, role, code);
        if (result.ok) { window.location.href = 'dashboard.html'; }
        else { errEl.textContent = result.msg; errEl.classList.add('show'); }
      } catch {
        errEl.textContent = '서버에 연결할 수 없습니다.'; errEl.classList.add('show');
      }
      btn.textContent = '가입하기 →'; btn.disabled = false;
    });
  </script>
</body>
</html>
