<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>로그인 | 라라댄스 출석 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#b89c6b" stroke-width="4"/>
          <g fill="#825b3a" stroke="#825b3a" stroke-linecap="round">
            <path d="M 45 65 L 140 120" stroke-width="6"/>
            <path d="M 120 108 L 165 135" stroke-width="3"/>
            <path d="M 95 95 C 105 110 120 115 125 105 C 115 100 105 92 95 95 Z" stroke="none"/>
            <path d="M 103 98 C 110 80 120 65 116 55 C 112 60 102 75 95 92 Z" stroke="none"/>
            <path d="M 116 55 Q 95 45 78 40" stroke-width="2.5" fill="none"/>
            <path d="M 115 55 Q 105 40 100 22" stroke-width="2" fill="none"/>
            <ellipse cx="122" cy="48" rx="7" ry="5.5" transform="rotate(-30 122 48)" stroke="none"/>
          </g>
          <text x="100" y="148" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="600" fill="#825b3a" text-anchor="middle" letter-spacing="0.1em">L A L A</text>
          <text x="100" y="165" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#825b3a" text-anchor="middle" letter-spacing="0.05em">DANCE STUDIO</text>
        </svg>
        <div class="logo-texts">
          <span class="logo-main">라라댄스무용학원</span>
          <span class="logo-badge">출석 관리 시스템</span>
        </div>
      </a>
      <nav class="nav-links"><a href="../index.html">← 홈으로</a></nav>
    </div>
  </header>

  <main class="auth-body">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">🩰</span>
        <h1 class="auth-title">로그인</h1>
        <p class="auth-sub">선생님 및 원생 전용 출석 관리 시스템입니다</p>
      </div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">아이디</label>
          <input type="text" id="email" class="form-input" placeholder="아이디 입력" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호 입력" autocomplete="current-password" />
        </div>
        <p class="form-error" id="errorMsg"></p>
        <button type="submit" class="btn-primary btn-gold" id="submitBtn">로그인 →</button>
        <button type="button" id="unlockBtn" style="display:none;margin-top:10px;width:100%;padding:10px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--text-mid);cursor:pointer;font-size:.9rem;">🔓 로그인 잠금 해제</button>
      </form>
      <div class="auth-divider">또는</div>
      <div class="auth-footer">
        처음 사용하시나요? <a href="signup.html">회원가입하기</a>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    // 최초 실행 시 관리자 계정 및 기본 데이터 초기화
    ensureAdmin().then(() => initDefaultData()).catch(console.warn);

    if (getSession()) window.location.href = 'dashboard.html';

    // 잠금 상태이면 해제 버튼 표시
    (function checkLock() {
      const mins = _loginLocked();
      if (mins) {
        document.getElementById('unlockBtn').style.display = 'block';
        document.getElementById('errorMsg').textContent = `로그인이 ${mins}분간 잠금 상태입니다.`;
        document.getElementById('errorMsg').classList.add('show');
      }
    })();

    document.getElementById('unlockBtn').addEventListener('click', function() {
      localStorage.removeItem('lala_lockout_until');
      localStorage.removeItem('lala_login_fails');
      this.style.display = 'none';
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = '잠금이 해제되었습니다.';
      errEl.style.color = 'green';
      setTimeout(() => { errEl.classList.remove('show'); errEl.style.color = ''; }, 2000);
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('errorMsg');
      const btn      = document.getElementById('submitBtn');

      if (!email || !password) {
        errEl.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
        errEl.classList.add('show'); return;
      }

      btn.textContent = '확인 중...'; btn.disabled = true;
      try {
        const result = await login(email, password);
        if (result.ok) { window.location.href = 'dashboard.html'; }
        else { errEl.textContent = result.msg; errEl.classList.add('show'); }
      } catch {
        errEl.textContent = '서버에 연결할 수 없습니다.'; errEl.classList.add('show');
      }
      btn.textContent = '로그인 →'; btn.disabled = false;
    });
  </script>
</body>
</html>
